metadata:
  name: "Multi-Step Pipeline"
  version: "1.0.0"

workflow:
  - id: "analyze"
    type: "llm"
    config:
      provider: "google"
      model: "gemini-2.0-flash-exp"
      system: "Extract key topics from the text."
      messages:
        - role: "user"
          content: "$input.text"
    result: "analysis"

  - id: "summarize"
    type: "llm"
    config:
      provider: "google"
      model: "gemini-2.0-flash-exp"
      system: "Summarize the analysis."
      messages:
        - role: "user"
          content: "$stepResult.analysis.text"
    result: "summary"

  - id: "format"
    type: "output-generator"
    config:
      template:
        topics: "$stepResult.analysis.text"
        summary: "$stepResult.summary.text"
        pipeline:
          steps: 3
          status: "completed"
    result: "report"
