name: ag-ui-kit
version: "0.1.0"
description: "AG-UI protocol adapter for dashboard integration"
author: "Beddel Team"
integrations:
  - name: BeddelAGUIAdapter
    module: adapter
    description: "AG-UI adapter for Beddel workflow event streams"
  - name: create_agui_endpoint
    module: endpoint
    description: "FastAPI AG-UI endpoint factory"
targets:
  python:
    module: "beddel_ag_ui"
    dependencies:
      - "ag-ui-protocol>=0.1"
      - "fastapi>=0.100"
      - "sse-starlette>=1.6"
