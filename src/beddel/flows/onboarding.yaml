# =============================================================================
# Beddel Onboarding — A2UI Interactive Form
# =============================================================================
#
# Interactive onboarding workflow using A2UI surfaces (output-generator primitive).
# 5-step pipeline: show form → generate config → show config card →
# save config (on Apply) → show saved confirmation.
#
# The generate/show steps run on the initial submit ($input.apply != true).
# The save/confirmation steps run only when the user clicks Apply, which
# re-runs the workflow with apply=true and the generated config_json.
#
# Usage (CLI):
#   beddel run src/beddel-flows/public/beddel/onboarding.yaml \
#     -i name="Alice" -i provider="gemini" -i project_type="research"
#
# Usage (browser):
#   beddel setup   → opens http://localhost:8080 with the A2UI renderer
#
# =============================================================================

id: beddel_onboarding
name: Beddel Onboarding
description: >
  Interactive onboarding workflow with A2UI form surfaces.
  Shows a setup form, generates a recommended config via Gemini,
  displays it as an A2UI card, and persists it on Apply.
version: "1.0"

tools:
  - name: save_config
    target: "beddel.cli.config:save_wizard_config"

input_schema:
  type: object
  properties:
    name:
      type: string
      description: Your name for personalization.
      default: "Developer"
    provider:
      type: string
      description: Preferred LLM provider (gemini, litellm, openai).
      default: "gemini"
    project_type:
      type: string
      description: Project type (general, research, automation).
      default: "general"
    apply:
      type: boolean
      description: When true, persist the generated config instead of generating.
      default: false
    config_json:
      type: string
      description: The generated config JSON passed back on Apply.
      default: ""
  required: []

steps:
  - id: show_form
    primitive: output-generator
    config:
      format: a2ui
      template:
        surfaceUpdate:
          id: onboarding-form
          components:
            - type: Text
              id: title
              props:
                content: "Welcome to Beddel"
                variant: h2
            - type: Text
              id: subtitle
              props:
                content: "Configure your environment to get started."
                variant: body1
            - type: TextInput
              id: name-input
              props:
                label: Your Name
                placeholder: Enter your name
            - type: Select
              id: provider-select
              props:
                label: LLM Provider
                options:
                  - label: Google Gemini
                    value: gemini
                  - label: LiteLLM (multi-provider)
                    value: litellm
                  - label: OpenAI
                    value: openai
            - type: Select
              id: project-type-select
              props:
                label: Project Type
                options:
                  - label: General
                    value: general
                  - label: Research Pipeline
                    value: research
                  - label: Automation
                    value: automation

  - id: generate_config
    primitive: llm
    if: "$input.apply != true"
    config:
      model: gemini-2.5-flash
      prompt: >
        Generate a minimal Beddel config.json for a user with these preferences:
        - Name: $input.name
        - LLM Provider: $input.provider
        - Project Type: $input.project_type

        Return ONLY a valid JSON object with these keys:
        - "llm_provider": the provider name
        - "default_model": a recommended model for the provider
        - "project_name": a slug based on the project type
        - "features": an array of recommended features for the project type

        Example:
        {"llm_provider": "gemini", "default_model": "gemini-2.0-flash", "project_name": "my-research", "features": ["memory", "reflection"]}
      temperature: 0.3
      max_tokens: 200
    timeout: 30.0

  - id: show_config
    primitive: output-generator
    if: "$input.apply != true"
    config:
      format: a2ui
      template:
        surfaceUpdate:
          id: config-card
          components:
            - type: Text
              id: config-title
              props:
                content: "Your Recommended Config"
                variant: h3
            - type: Text
              id: config-body
              props:
                content: "Based on your preferences, here is your recommended configuration."
                variant: body1
            - type: Text
              id: config-json
              props:
                content: "$stepResult.generate_config.content"
                variant: code
            - type: Button
              id: apply-btn
              props:
                label: Apply Config
                variant: primary

  - id: save_config
    primitive: tool
    if: "$input.apply == true"
    config:
      tool: save_config
      arguments:
        config_json: "$input.config_json"
        name: "$input.name"
        provider: "$input.provider"
        project_type: "$input.project_type"

  - id: show_saved
    primitive: output-generator
    if: "$input.apply == true"
    config:
      format: a2ui
      template:
        surfaceUpdate:
          id: saved-card
          components:
            - type: Text
              id: saved-title
              props:
                content: "Config Saved"
                variant: h3
            - type: Text
              id: saved-body
              props:
                content: "Your configuration was saved to ~/.config/beddel/config.json. Run: beddel run <workflow>"
                variant: body1
