# =============================================================================
# Beddel Setup — Interactive Configuration Wizard
# =============================================================================
#
# Two-section form split by responsibility:
#   Fieldset 1 (Personal Preferences → SQLite user_prefs):
#     - llm_provider, default_model, project_name
#   Fieldset 2 (Project Infrastructure → config.json):
#     - dashboard_url, agent_engine
#
# No LLM required. Direct form → save → confirmation.
#
# Usage (CLI):
#   beddel run --bundled setup -i llm_provider="gemini" -i default_model="gemini-2.5-flash"
#
# Usage (browser):
#   beddel launch → opens http://localhost:8080 with the A2UI renderer
#
# =============================================================================

id: beddel_setup
name: Beddel Setup
description: >
  Configure your Beddel environment. Personal preferences are stored locally
  in SQLite; project infrastructure settings go to config.json.
version: "2.0"
interaction: interactive

tools:
  - name: load_setup
    target: "beddel.cli.config:load_setup"
  - name: save_setup
    target: "beddel.cli.config:save_setup"

input_schema:
  type: object
  properties:
    # --- Personal Preferences (→ SQLite) ---
    llm_provider:
      type: string
      description: Preferred LLM provider.
      default: "gemini"
    default_model:
      type: string
      description: Default model for the chosen provider.
      default: "gemini-2.5-flash"
    project_name:
      type: string
      description: Project slug for identification.
      default: ""
    # --- Project Infrastructure (→ config.json) ---
    dashboard_url:
      type: string
      description: Remote dashboard URL (leave empty for local-only).
      default: ""
    agent_engine:
      type: string
      description: Google Cloud project for Vertex AI Agent Engine (optional).
      default: ""
    # --- Control flags ---
    generate:
      type: boolean
      description: Set to true when the form is submitted.
      default: false
  required: []

steps:
  - id: load_state
    primitive: tool
    config:
      tool: load_setup
      arguments: {}

  - id: show_form
    primitive: output-generator
    config:
      format: a2ui
      template:
        surfaceUpdate:
          id: setup-form
          components:
            - type: Text
              id: title
              props:
                content: "Beddel Setup"
                variant: h2

            # ── Fieldset 1: Personal Preferences (→ SQLite) ──
            - type: Text
              id: prefs-header
              props:
                content: "Personal Preferences"
                variant: h3
            - type: Text
              id: prefs-desc
              props:
                content: "Stored locally in your machine. Not shared with the team."
                variant: body1
            - type: Select
              id: llm_provider
              props:
                label: LLM Provider
                value: "$stepResult.load_state.result.llm_provider"
                options:
                  - label: Google Gemini (recommended)
                    value: gemini
                  - label: LiteLLM (multi-provider)
                    value: litellm
                  - label: OpenAI
                    value: openai
            - type: TextInput
              id: default_model
              props:
                label: Default Model
                value: "$stepResult.load_state.result.default_model"
                placeholder: "gemini-2.5-flash"
            - type: TextInput
              id: project_name
              props:
                label: Project Name
                value: "$stepResult.load_state.result.project_name"
                placeholder: "my-project"

            # ── Fieldset 2: Project Infrastructure (→ config.json) ──
            - type: Text
              id: infra-header
              props:
                content: "Project Infrastructure"
                variant: h3
            - type: Text
              id: infra-desc
              props:
                content: "Shared settings for this project. Saved to ~/.config/beddel/config.json."
                variant: body1
            - type: TextInput
              id: dashboard_url
              props:
                label: Dashboard URL
                value: "$stepResult.load_state.result.dashboard_url"
                placeholder: "https://connect.beddel.com.br (optional)"
            - type: TextInput
              id: agent_engine
              props:
                label: Agent Engine Project
                value: "$stepResult.load_state.result.agent_engine"
                placeholder: "my-gcp-project (optional)"

            - type: Button
              id: submit-btn
              props:
                label: Save Configuration
                variant: primary

  - id: save
    primitive: tool
    if: "$input.generate == true"
    config:
      tool: save_setup
      arguments:
        llm_provider: "$input.llm_provider"
        default_model: "$input.default_model"
        project_name: "$input.project_name"
        dashboard_url: "$input.dashboard_url"
        agent_engine: "$input.agent_engine"

  - id: show_done
    primitive: output-generator
    if: "$input.generate == true"
    config:
      format: a2ui
      template:
        surfaceUpdate:
          id: done-card
          components:
            - type: Text
              id: done-title
              props:
                content: "Setup Complete"
                variant: h3
            - type: Text
              id: done-body
              props:
                content: "Your preferences were saved. Run: beddel launch"
                variant: body1
