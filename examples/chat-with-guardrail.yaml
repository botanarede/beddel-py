# =============================================================================
# Chat with Output Guardrail
# =============================================================================
#
# 3-step workflow: chat conversation → validate output → format report.
# Demonstrates multi-turn chat, guardrail validation with auto-correction,
# and structured output generation.
#
# Primitives: chat (×1), guardrail (×1), output-generator (×1)
# Strategies: retry (step 1), fail (default)
# Variables: $input.question, $input.context, $stepResult.*
#
# Usage:
#   beddel run examples/chat-with-guardrail.yaml \
#     -i question="What are the benefits of microservices?" \
#     -i context="enterprise software architecture"
# =============================================================================

id: chat_with_guardrail
name: Chat with Output Guardrail
description: >
  Multi-turn chat that answers a question in context, validates
  the response structure via guardrail, and renders a final report.
version: "1.0"

input_schema:
  type: object
  properties:
    question:
      type: string
    context:
      type: string
  required:
    - question
    - context

steps:
  - id: answer
    primitive: chat
    config:
      model: gemini/gemini-2.0-flash
      system: >
        You are a senior software architect. Answer questions clearly
        and concisely. Always structure your response with: a one-line
        summary, 3-5 key points, and a conclusion.
      messages:
        - role: user
          content: >
            Context: $input.context

            Question: $input.question
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 1.0
        jitter: true
    timeout: 30.0

  - id: validate
    primitive: guardrail
    config:
      data: "$stepResult.answer.content"
      schema:
        fields:
          content:
            type: str
            required: true
      strategy: return_errors

  - id: report
    primitive: output-generator
    config:
      template: |
        # Q&A Report

        **Question:** $input.question
        **Context:** $input.context

        ## Answer

        $stepResult.answer.content

        ---
        _Generated by Beddel Chat with Guardrail v1.0_
      format: markdown
