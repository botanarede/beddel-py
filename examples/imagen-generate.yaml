# =============================================================================
# Image Generation Workflow — Imagen 4 Ultra via Vertex AI ADC
# =============================================================================
#
# Generates images using Google's most advanced image model (Imagen 4 Ultra)
# through the Agent Platforms / Vertex AI with ADC authentication.
#
# Uses a 2-step pipeline:
#   1. LLM refines the user prompt into an optimized image generation prompt
#   2. Tool calls Imagen 4 Ultra via google-genai SDK (vertexai=True, ADC)
#
# Primitives: llm (×1), tool (×1), output-generator (×1)
# Provider: GeminiProvider (via LiteLLM gemini/ prefix)
# Auth: Application Default Credentials (gcloud auth application-default login)
#
# Prerequisites:
#   pip install google-genai Pillow
#   gcloud auth application-default login
#
# Usage:
#   beddel run examples/imagen-generate.yaml \
#     -i prompt="A serene yoga scene with tropical leaves" \
#     -i aspect_ratio="16:9" \
#     -i output_path="/tmp/hero.webp"
# =============================================================================

id: imagen_generate
name: "Imagen 4 Ultra — Image Generation"
description: >
  Generates high-quality images using Google Imagen 4 Ultra via Vertex AI
  with ADC authentication. Includes prompt refinement via Gemini.
version: "1.0"

input_schema:
  type: object
  properties:
    prompt:
      type: string
      description: "Description of the image to generate"
    aspect_ratio:
      type: string
      enum: ["1:1", "3:4", "4:3", "9:16", "16:9"]
      description: "Image aspect ratio"
    output_path:
      type: string
      description: "File path to save the generated image (webp)"
    project:
      type: string
      description: "GCP project ID for Vertex AI"
    location:
      type: string
      description: "GCP region for Vertex AI"
  required:
    - prompt
    - output_path

steps:
  # Step 1: Refine the user prompt into an optimized image generation prompt
  - id: refine_prompt
    primitive: llm
    config:
      model: gemini/gemini-2.5-flash-lite
      prompt: >
        You are an expert prompt engineer for AI image generation.
        Rewrite the following description into an optimized prompt for
        Imagen 4 Ultra. The prompt should be detailed, specify lighting,
        composition, color palette, and style. Always include
        "no text, no logos, no people, no faces, no hands" at the end.
        Keep it under 200 words.

        Original description: $input.prompt

        Return ONLY the optimized prompt, nothing else.
      temperature: 0.7
      max_tokens: 300

  # Step 2: Generate image using Imagen 4 Ultra via Vertex AI ADC
  - id: generate
    primitive: tool
    config:
      tool: imagen_generate
      arguments:
        prompt: "$stepResult.refine_prompt.content"
        aspect_ratio: "$input.aspect_ratio"
        output_path: "$input.output_path"
        project: "$input.project"
        location: "$input.location"
    timeout: 120.0

  # Step 3: Output report
  - id: report
    primitive: output-generator
    config:
      template: |
        # Image Generated Successfully

        **Model:** Imagen 4 Ultra (imagen-4.0-ultra-generate-001)
        **Auth:** Vertex AI ADC (Application Default Credentials)
        **Aspect Ratio:** $input.aspect_ratio
        **Output:** $input.output_path

        ## Original Prompt
        $input.prompt

        ## Refined Prompt
        $stepResult.refine_prompt.content

        ## Result
        $stepResult.generate.message

        ---
        _Generated by Beddel Imagen Workflow v1.0_
      format: markdown
