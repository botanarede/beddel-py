# =============================================================================
# Multi-Step Research Pipeline
# =============================================================================
#
# 3-step sequential workflow: summarize → extract keywords → generate report.
# Exercises the core execution loop with cross-step variable resolution.
#
# Primitives: llm (×2), output-generator (×1)
# Strategies: retry (step 1)
# Variables: $input.topic, $input.depth, $stepResult.*
#
# Usage:
#   beddel run examples/research-pipeline.yaml \
#     -i topic="AI agents" -i depth="brief"
# =============================================================================

id: research_pipeline
name: Research Pipeline
description: >
  Takes a topic, summarizes it, extracts keywords, and generates
  a structured markdown report combining all prior step results.
version: "1.0"

input_schema:
  type: object
  properties:
    topic:
      type: string
    depth:
      type: string
      enum: ["brief", "detailed", "comprehensive"]
  required:
    - topic
    - depth

steps:
  - id: summarize
    primitive: llm
    config:
      model: gemini/gemini-2.5-flash-lite
      prompt: >
        Summarize the following topic at a $input.depth level.
        Topic: $input.topic
        Provide a clear, factual summary in 2-3 paragraphs.
      temperature: 0.5
      max_tokens: 500
    execution_strategy:
      type: retry
      retry:
        max_attempts: 3
        backoff_base: 1.5
        jitter: true
    timeout: 30.0

  - id: extract_keywords
    primitive: llm
    config:
      model: gemini/gemini-2.5-flash-lite
      prompt: >
        Extract 5-10 keywords from the following summary.
        Return them as a comma-separated list, nothing else.

        Summary: $stepResult.summarize.content
      max_tokens: 100
      temperature: 0.2

  - id: report
    primitive: output-generator
    config:
      template: |
        # Research Report: $input.topic

        **Depth:** $input.depth

        ## Summary

        $stepResult.summarize.content

        ## Keywords

        $stepResult.extract_keywords.content

        ---
        _Generated by Beddel Research Pipeline v1.0_
      format: markdown
