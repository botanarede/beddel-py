# =============================================================================
# Local LLM Chatbot — LM Studio Integration Test
# =============================================================================
#
# Multi-turn chat workflow using a local LLM via LM Studio's OpenAI-compatible
# API. Demonstrates the `chat` primitive with conversation history (system +
# user + assistant + user) routed through LiteLLM's openai/ prefix.
#
# Primitives: chat (×1), output-generator (×1)
# Strategies: retry (step 1)
# Variables: $input.question, $stepResult.*
#
# Requires:
#   - LM Studio running with a loaded model at http://192.168.0.10:1234
#   - OPENAI_API_KEY set to any value (LM Studio ignores it, but LiteLLM requires it)
#   - OPENAI_API_BASE=http://192.168.0.10:1234/v1
#
# Usage:
#   OPENAI_API_KEY=lm-studio OPENAI_API_BASE=http://192.168.0.10:1234/v1 \
#     beddel run examples/local-llm-chatbot.yaml \
#       -i question="What is hexagonal architecture?"
# =============================================================================

id: local_llm_chatbot
name: Local LLM Chatbot
description: >
  Multi-turn chatbot with declared conversation history, powered by a
  local LLM running on LM Studio. Uses the chat primitive with
  system prompt, seeded history, and a dynamic user question.
version: "1.0"

input_schema:
  type: object
  properties:
    question:
      type: string
      description: The user's question to the chatbot
  required:
    - question

steps:
  - id: conversation
    primitive: chat
    config:
      model: openai/google/gemma-4-e2b
      system: >
        You are Beddel Assistant, a helpful AI running locally on the user's
        network via LM Studio. You are concise, friendly, and technical.
        Always answer in English.
      messages:
        - role: user
          content: "Hi! What can you do?"
        - role: assistant
          content: >
            Hello! I'm Beddel Assistant running on your local LM Studio.
            I can help with coding questions, architecture discussions,
            and general knowledge. What would you like to know?
        - role: user
          content: "$input.question"
      temperature: 0.7
      max_tokens: 300
      max_messages: 20
    execution_strategy:
      type: retry
      retry:
        max_attempts: 2
        backoff_base: 1.0
        jitter: true
    timeout: 60.0

  - id: report
    primitive: output-generator
    config:
      template: |
        # Local LLM Chatbot Response

        **Question:** $input.question
        **Model:** google/gemma-4-e2b (LM Studio local)

        ## Response

        $stepResult.conversation.content

        ---
        _Generated by Beddel Local LLM Chatbot v1.0_
      format: markdown
