top_issues:
  - id: "DOC-001"
    severity: low
    finding: "extra_params docstring says 'forwarded in a future release' but params are already forwarded now via _build_params() — stale documentation"
    suggested_action: "Update ProviderConfig.extra_params docstring to reflect current behavior (1-line fix)"

  - id: "SAFE-001"
    severity: medium
    finding: "extra_params can override reserved request keys (model, messages, temperature, stream) via params.update() in _build_params() — could cause silent misbehavior if misconfigured"
    suggested_action: "Add a RESERVED_KEYS blocklist in _build_params() that logs a warning and skips conflicting keys, or raise ConfigurationError on collision. Address in a future hardening story."

  - id: "NORM-001"
    severity: low
    finding: "Provider names are case-sensitive with no normalization — 'OpenRouter' and 'openrouter' would be treated as different providers"
    suggested_action: "Apply .lower() normalization in register() and get() to prevent case drift. Low priority — convention is documented as lowercase."

