top_issues:
  - id: "CODE-001"
    severity: low
    finding: "litellm.Usage fallback in complete() couples to LiteLLM internals — if litellm.Usage is removed or renamed in a future version, this line breaks"
    suggested_action: "Replace `litellm.Usage(prompt_tokens=0, ...)` with direct `TokenUsage(prompt_tokens=0, ...)` construction — 2-line change, no behavior difference"

  - id: "TEST-001"
    severity: low
    finding: "Two uncovered lines (96%): max_tokens branch (line 59) and ProviderError re-raise in stream (line 128)"
    suggested_action: "Add test for complete() with max_tokens set, and test for stream() re-raising ProviderError without double-wrap — nice-to-have, coverage already exceeds 80% threshold"

  - id: "ARCH-001"
    severity: low
    finding: "temperature is always sent to LiteLLM even at default value (0.7) — some providers may behave differently when temperature is explicitly set vs omitted"
    suggested_action: "Design choice accepted for v0.1.0 — revisit if provider-specific quirks surface"

  - id: "ARCH-002"
    severity: low
    finding: "LLMRequest.stream field is unused by the adapter (stream behavior is method-driven, not field-driven)"
    suggested_action: "Consider removing LLMRequest.stream field or documenting it as reserved for future use"

