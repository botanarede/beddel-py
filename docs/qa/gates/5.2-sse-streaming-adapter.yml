recommendations:
  - "SSE-001 (private import) is the highest priority — address in the next story touching integrations/ or as a standalone cleanup. Rename _build_error_event to a public function or promote to BeddelSSEAdapter static method."
  - "SSE-002 (missing BeddelError subtype tests) is a quick win — add parametrized test in next test hardening pass."
  - "SSE-003 (multi-line data) and SSE-004 (AsyncIterable) are low priority — track for when the adapter is extended for non-JSON payloads or additional framework integrations."
  - "SSE-005 (CancelledError documentation) is trivial — add a one-line comment in the next touch of sse.py."
