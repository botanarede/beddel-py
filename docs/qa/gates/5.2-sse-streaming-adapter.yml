schema: 1
story: "5.2"
story_title: "SSE Streaming Response Adapter"
gate: CONCERNS
status_reason: "All 10 acceptance criteria met. 30 unit tests pass across 11 test classes. Both architect reviews completed — Winston APPROVE, GPT-5.2 CONCERNS. One medium-severity issue: _build_error_event is imported as a private function across module boundary (fastapi.py imports from sse.py). Code is functionally correct and architecturally sound; the medium issue is a design smell, not a defect."
reviewer: "Quinn (Test Architect)"
updated: "2026-02-10"

top_issues:
  - id: "SSE-001"
    severity: medium
    finding: "_build_error_event is a module-private function in sse.py but is imported across module boundary by fastapi.py (_sse_bridge error handler). This violates the convention that underscore-prefixed names are internal to their module."
    suggested_action: "Promote to public API: either rename to build_error_event() (public module function) or make it a @staticmethod on BeddelSSEAdapter. Update fastapi.py import accordingly."

  - id: "SSE-002"
    severity: low
    finding: "Missing explicit test cases for ResolutionError, PrimitiveError, ProviderError, and ConfigurationError. Code handles all BeddelError subtypes correctly via isinstance check, but tests only verify ParseError and ExecutionError."
    suggested_action: "Add parametrized test cases for the remaining BeddelError subtypes to ensure full error mapping coverage."

  - id: "SSE-003"
    severity: low
    finding: "serialize() does not split multi-line data into multiple data: lines per SSE specification. Safe for current JSON payloads (always single-line) but would produce invalid SSE for raw multi-line text."
    suggested_action: "Add multi-line data handling in serialize() (split on newlines, prefix each with 'data: ') and add corresponding test. Low priority — current usage is JSON-only."

  - id: "SSE-004"
    severity: low
    finding: "Strict AsyncIterator type check in stream() may miss AsyncIterable objects. Current callers always provide AsyncIterator so this is safe today."
    suggested_action: "Consider broadening the isinstance check to include AsyncIterable, or document the AsyncIterator requirement explicitly."

  - id: "SSE-005"
    severity: low
    finding: "Broad except Exception in stream_iterator() could theoretically swallow cancellation errors. In Python 3.11+ CancelledError inherits from BaseException (not Exception) so this is actually safe, but the assumption is undocumented."
    suggested_action: "Add a code comment documenting that CancelledError is a BaseException in Python 3.11+ and will propagate correctly."

