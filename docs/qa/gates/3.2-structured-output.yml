top_issues:
  - id: "MYPY-001"
    severity: low
    finding: "mypy no-any-return warning on llm.py line 149 — type narrowing issue where return type is not fully constrained after structured output branch"
    suggested_action: "Add a cast or type guard to narrow the return type — cosmetic fix, no runtime impact"

  - id: "ARCH-001"
    severity: medium
    finding: "Return type union LLMResponse | AsyncIterator[str] | dict[str, Any] is broad, which may complicate downstream composition and type checking"
    suggested_action: "Consider an envelope type or separate primitives for structured vs unstructured output in a future story — not blocking at v0.1.0"

  - id: "ARCH-002"
    severity: low
    finding: "StructuredOutputHandler encodes LiteLLM-specific response_format shape (json_schema wrapper) — couples adapter to single provider format"
    suggested_action: "Acceptable with single provider at v0.1.0. Split into domain codec + provider mapper if a second provider is added"

  - id: "ARCH-003"
    severity: low
    finding: "Primitive imports adapter directly (from beddel.adapters.structured) without a port/protocol abstraction"
    suggested_action: "Acceptable for stateless codec at v0.1.0. Consider a small Protocol interface for future stability if more adapters are introduced"

  - id: "OBS-001"
    severity: low
    finding: "Both JSON parse errors and Pydantic validation errors raise PrimitiveError with same code BEDDEL-EXEC-001 — distinguishable only by error message text"
    suggested_action: "Add a reason subtype in error details (e.g., 'json_parse' vs 'validation') for improved observability and programmatic error handling"

