    finding: "README WorkflowExecutor example omits the resolver parameter. While defensible (resolver has a default and is an internal concern), advanced users extending the executor may be confused by its absence."
    suggested_action: "Add a brief note in the WorkflowExecutor section mentioning that a VariableResolver is created internally by default, or add resolver as an optional parameter in the code example."

